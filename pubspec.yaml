name: we_are_ready
description: "ChuayNooDuay — disaster-response volunteer matching app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  cloud_firestore: ^6.4.1
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.2
  flutter_riverpod: ^2.6.1
  provider: ^6.1.5
  go_router: ^14.8.1
  geolocator: ^13.0.4
  flutter_dotenv: ^6.0.1
  google_fonts: ^6.3.3
  google_maps_flutter: ^2.17.1
  web: ^1.1.1
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
